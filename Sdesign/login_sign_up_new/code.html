<body class="min-h-screen flex flex-col justify-center items-center p-margin-mobile bg-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Container -->

<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-secondary-container/20 rounded-full blur-3xl pointer-events-none"></div>
<!-- Logo & Header -->

<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center shadow-sm">

</div>
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-unit">SkillForge</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Master new skills, advance your career.</p>
</div>
</header>
<!-- Welcome Text -->
<div class="text-center relative z-10 mt-stack-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-unit">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-secondary">Sign in to continue your learning journey.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-stack-md relative z-10 w-full mt-stack-sm" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative flex items-center bg-surface-container-low rounded-lg border border-outline-variant overflow-hidden transition-all duration-200 input-field">
<span class="material-symbols-outlined text-secondary absolute left-4">mail</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-outline" id="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit relative">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center bg-surface-container-low rounded-lg border border-outline-variant overflow-hidden transition-all duration-200 input-field">
<span class="material-symbols-outlined text-secondary absolute left-4">lock</span>
<input class="w-full bg-transparent border-none py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-outline" id="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-4 text-secondary hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>

</button>

<script>
        // Simple script to toggle password visibility
        const passwordInput = document.getElementById('password');
        const toggleBtn = passwordInput.nextElementSibling;
        const iconSpan = toggleBtn.querySelector('span');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            iconSpan.textContent = type === 'password' ? 'visibility_off' : 'visibility';
            iconSpan.classList.toggle('text-primary');
        });
    </script>
